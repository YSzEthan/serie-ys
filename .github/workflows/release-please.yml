name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

env:
  CARGO_TERM_COLOR: always

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
    steps:
      - id: rp
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    strategy:
      fail-fast: false
      matrix:
        t:
          - target: aarch64-apple-darwin
            runner: macos-latest
            bin_ext: ""
            label: macos-arm64
          - target: x86_64-apple-darwin
            runner: macos-latest
            bin_ext: ""
            label: macos-x64
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            bin_ext: ""
            label: linux
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            bin_ext: ".exe"
            label: windows
    runs-on: ${{ matrix.t.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}
      - name: Setup rust target
        run: rustup target add ${{ matrix.t.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.t.target }}
      - name: Build
        uses: houseabsolute/actions-rust-cross@v1.0.0
        with:
          command: build
          target: ${{ matrix.t.target }}
          args: "--release"
      - name: Stage
        shell: bash
        run: |
          VER="${{ needs.release-please.outputs.tag_name }}"
          VER="${VER#v}"
          ASSET="ysgit_${VER}-${{ matrix.t.label }}${{ matrix.t.bin_ext }}"
          cp "target/${{ matrix.t.target }}/release/ysgit${{ matrix.t.bin_ext }}" "$ASSET"
          echo "ASSET=$ASSET" >> "$GITHUB_ENV"
      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.t.target }}
          path: ${{ env.ASSET }}
          if-no-files-found: error

  upload:
    needs: [release-please, build]
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: releases
          pattern: release-*
          merge-multiple: true
      - name: Checksum
        run: cd releases && sha256sum * > checksum.txt
      - uses: softprops/action-gh-release@v2.0.4
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: releases/*
          make_latest: true
