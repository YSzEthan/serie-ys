name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        t:
          - target: aarch64-apple-darwin
            runner: macos-latest
            archive: tar.gz
            bin_ext: ""
          - target: x86_64-apple-darwin
            runner: macos-latest
            archive: tar.gz
            bin_ext: ""
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            archive: tar.gz
            bin_ext: ""
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            archive: zip
            bin_ext: ".exe"
    runs-on: ${{ matrix.t.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup rust target
        run: rustup target add ${{ matrix.t.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.t.target }}
      - name: Build
        uses: houseabsolute/actions-rust-cross@v1.0.0
        with:
          command: build
          target: ${{ matrix.t.target }}
          args: "--release"
      - name: Vars
        shell: bash
        run: |
          VER="${GITHUB_REF_NAME#v}"
          echo "RELEASE_VERSION=$VER" >> "$GITHUB_ENV"
          echo "ARCHIVE=ysgit-$VER-${{ matrix.t.target }}.${{ matrix.t.archive }}" >> "$GITHUB_ENV"
      - name: Stage
        shell: bash
        run: cp "target/${{ matrix.t.target }}/release/ysgit${{ matrix.t.bin_ext }}" "ysgit${{ matrix.t.bin_ext }}"
      - name: Archive (macOS)
        if: runner.os == 'macOS'
        shell: zsh -e {0}
        run: tar -czf "$ARCHIVE" ysgit
      - name: Archive (Linux)
        if: runner.os == 'Linux'
        shell: bash -e {0}
        run: tar -czf "$ARCHIVE" ysgit
      - name: Archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path ysgit.exe -DestinationPath $env:ARCHIVE
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.t.target }}
          path: ${{ env.ARCHIVE }}
          if-no-files-found: error

  release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: releases
          pattern: release-*
          merge-multiple: true
      - name: Checksum
        run: cd releases && sha256sum * > checksum.txt
      - name: Create Release
        uses: softprops/action-gh-release@v2.0.4
        with:
          draft: true
          generate_release_notes: true
          make_latest: true
          files: releases/*
