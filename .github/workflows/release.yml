name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        t:
          - target: aarch64-apple-darwin
            runner: macos-latest
            bin_ext: ""
            label: macos-arm64
          - target: x86_64-apple-darwin
            runner: macos-latest
            bin_ext: ""
            label: macos-x64
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            bin_ext: ""
            label: linux
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            bin_ext: ".exe"
            label: windows
    runs-on: ${{ matrix.t.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup rust target
        run: rustup target add ${{ matrix.t.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.t.target }}
      - name: Build
        uses: houseabsolute/actions-rust-cross@v1.0.0
        with:
          command: build
          target: ${{ matrix.t.target }}
          args: "--release"
      - name: Stage
        shell: bash
        run: |
          VER="${GITHUB_REF_NAME#v}"
          ASSET="ysgit_${VER}-${{ matrix.t.label }}${{ matrix.t.bin_ext }}"
          cp "target/${{ matrix.t.target }}/release/ysgit${{ matrix.t.bin_ext }}" "$ASSET"
          echo "ASSET=$ASSET" >> "$GITHUB_ENV"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.t.target }}
          path: ${{ env.ASSET }}
          if-no-files-found: error

  release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: releases
          pattern: release-*
          merge-multiple: true
      - name: Checksum
        run: cd releases && sha256sum * > checksum.txt
      - name: Create Release
        uses: softprops/action-gh-release@v2.0.4
        with:
          draft: true
          generate_release_notes: true
          make_latest: true
          files: releases/*
